<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="theme-color" content="#000000" />
    <!--
      These are the static, no-JS defaults read by social scrapers (which do
      not execute JavaScript). They mirror src/site.config.ts. Per-route
      titles, descriptions, canonical links, and social images are applied at
      runtime via <HeadContent /> for JS-capable crawlers and for the in-app UI.
    -->
    <meta
      name="description"
      content="White-glove technology partnership for owner-led businesses. We diagnose operational friction with a workflow diagnostic, then clarify what technology is worth building."
    />
    <meta name="author" content="RelentNet" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://relentnet.com/" />
    <meta
      property="og:title"
      content="RelentNet | Workflow Diagnostic & Technology Stewardship"
    />
    <meta
      property="og:description"
      content="White-glove technology partnership for owner-led businesses. We diagnose operational friction with a workflow diagnostic, then clarify what technology is worth building."
    />
    <meta property="og:image" content="https://relentnet.com/logo512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://relentnet.com/" />
    <meta
      property="twitter:title"
      content="RelentNet | Workflow Diagnostic & Technology Stewardship"
    />
    <meta
      property="twitter:description"
      content="White-glove technology partnership for owner-led businesses. We diagnose operational friction with a workflow diagnostic, then clarify what technology is worth building."
    />
    <meta
      property="twitter:image"
      content="https://relentnet.com/logo512.png"
    />

    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>RelentNet | Workflow Diagnostic & Technology Stewardship</title>

    <!-- Structured data (static so non-JS crawlers can read it). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "RelentNet",
        "image": "https://relentnet.com/logo512.png",
        "url": "https://relentnet.com",
        "telephone": "+1 (727) 616-1060",
        "priceRange": "$$$$",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Nashville",
          "addressRegion": "TN",
          "addressCountry": "US"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 36.1627,
          "longitude": -86.7816
        },
        "areaServed": [
          { "@type": "State", "name": "Tennessee" },
          { "@type": "State", "name": "Louisiana" },
          { "@type": "State", "name": "Georgia" },
          { "@type": "State", "name": "Florida" }
        ],
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "09:00",
          "closes": "18:00"
        },
        "description": "White-glove technology partnership for owner-led businesses. We diagnose operational friction with a workflow diagnostic, then clarify what technology is worth building."
      }
    </script>
    <script>
      document.documentElement.classList.toggle(
        'dark',
        localStorage.theme === 'dark' ||
          (!('theme' in localStorage) &&
            window.matchMedia('(prefers-color-scheme: dark)').matches),
      )
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
