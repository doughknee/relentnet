server {
  listen 80 default_server;
  server_name _;

  rewrite ^/portfolio$ /clients permanent;
  rewrite ^/portfolio/(.+)$ /clients/$1 permanent;

  root /usr/share/nginx/html;
  index index.html;

  location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|webp|ico|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Prerendered routes live at <route>/index.html. Fall back to the SPA
    # shell (_shell.html) so any non-prerendered path still boots the client
    # router (which renders the 404 route for unknown paths).
    try_files $uri $uri/index.html /_shell.html;
  }

  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }
}
